name: Test All Example Files

on:
  push:
    branches: [ next-0.1.2, main ]
  pull_request:
    branches: [ next-0.1.2, main ]
  workflow_dispatch:

jobs:
  test-example-syntax:
    name: Test Example File Syntax
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge || true
        pip install --no-cache-dir --force-reinstall -e ".[dev]"

    - name: List all example files
      run: |
        echo "=== Example Files Found ==="
        find examples/ -name "*.py" -type f | sort
        echo ""
        echo "Total: $(find examples/ -name "*.py" -type f | wc -l) files"

    - name: Test syntax of all example files
      run: |
        echo "=== Testing Python Syntax ==="
        failed=0
        total=0
        
        while IFS= read -r file; do
          total=$((total + 1))
          echo -n "Testing $file... "
          if python -m py_compile "$file" 2>/dev/null; then
            echo "PASS"
          else
            echo "FAIL"
            python -m py_compile "$file"
            failed=$((failed + 1))
          fi
        done < <(find examples/ -name "*.py" -type f | sort)
        
        echo ""
        echo "=== Results ==="
        echo "Total files: $total"
        echo "Passed: $((total - failed))"
        echo "Failed: $failed"
        
        if [ $failed -gt 0 ]; then
          echo "Some example files have syntax errors"
          exit 1
        else
          echo "All example files have valid syntax"
        fi

  test-example-imports:
    name: Test Example Imports
    runs-on: ubuntu-latest
    needs: test-example-syntax
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge || true
        pip install --no-cache-dir --force-reinstall -e ".[dev]"

    - name: Create import test script
      run: |
        cat > /tmp/test_imports.py << 'EOF'
        import ast
        import sys

        def test_imports(filepath):
            try:
                with open(filepath, 'r') as f:
                    content = f.read()
                
                tree = ast.parse(content, filepath)
                
                imports = []
                for node in ast.walk(tree):
                    if isinstance(node, ast.Import):
                        for alias in node.names:
                            imports.append(alias.name)
                    elif isinstance(node, ast.ImportFrom):
                        if node.module:
                            imports.append(node.module)
                
                has_pytfe = any('pytfe' in imp for imp in imports)
                
                if has_pytfe:
                    print('PASS')
                    return 0
                else:
                    print('WARN')
                    return 0
                    
            except SyntaxError as e:
                print(f'FAIL: {e}')
                return 1
            except Exception as e:
                print(f'FAIL: {e}')
                return 1

        if __name__ == '__main__':
            sys.exit(test_imports(sys.argv[1]))
        EOF

    - name: Test imports in all example files
      run: |
        echo "=== Testing Imports ==="
        failed=0
        total=0
        
        while IFS= read -r file; do
          total=$((total + 1))
          filename=$(basename "$file")
          echo -n "Testing imports in $filename... "
          
          result=$(python /tmp/test_imports.py "$file")
          exit_code=$?
          
          if [ $exit_code -eq 0 ]; then
            if [[ "$result" == "PASS" ]]; then
              echo "PASS (imports pytfe)"
            else
              echo "WARN (no pytfe import)"
            fi
          else
            echo "FAIL: $result"
            failed=$((failed + 1))
          fi
        done < <(find examples/ -name "*.py" -type f | sort)
        
        echo ""
        echo "=== Import Test Results ==="
        echo "Total files: $total"
        echo "Passed: $((total - failed))"
        echo "Failed: $failed"
        
        if [ $failed -gt 0 ]; then
          echo "Some example files have import issues"
          exit 1
        else
          echo "All example files passed import tests"
        fi

  test-example-linting:
    name: Lint Example Files
    runs-on: ubuntu-latest
    needs: test-example-syntax
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge || true
        pip install --no-cache-dir --force-reinstall -e ".[dev]"

    - name: Run ruff on example files
      run: |
        echo "=== Linting Example Files ==="
        python -m ruff check examples/ --config pyproject.toml || true
        echo ""
        echo "=== Formatting Check ==="
        python -m ruff format --check examples/ || true

  test-all-examples-matrix:
    name: Test Examples on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: test-example-syntax
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge || true
        pip install --no-cache-dir --force-reinstall -e ".[dev]"

    - name: Test example syntax on Python ${{ matrix.python-version }}
      run: |
        echo "=== Testing on Python ${{ matrix.python-version }} ==="
        failed=0
        total=0
        
        while IFS= read -r file; do
          total=$((total + 1))
          if python -m py_compile "$file" 2>/dev/null; then
            :
          else
            echo "FAIL: $file"
            failed=$((failed + 1))
          fi
        done < <(find examples/ -name "*.py" -type f)
        
        echo "Python ${{ matrix.python-version }}: $((total - failed))/$total passed"
        
        if [ $failed -gt 0 ]; then
          exit 1
        fi

  execute-examples:
    name: Execute Example Files
    runs-on: ubuntu-latest
    needs: [test-example-syntax, test-example-imports]
    env:
      TFE_TOKEN: ${{ secrets.TFE_TOKEN }}
      TFE_URL: ${{ secrets.TFE_URL || 'https://app.terraform.io' }}
      TFE_ORG: ${{ secrets.TFE_ORG }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge || true
        pip install --no-cache-dir --force-reinstall -e ".[dev]"

    - name: Execute all example files
      run: |
        echo "=== Executing Example Files ==="
        echo "Note: Examples requiring TFE credentials will show expected errors"
        echo ""
        
        executed=0
        passed=0
        failed=0
        skipped=0
        
        while IFS= read -r file; do
          executed=$((executed + 1))
          filename=$(basename "$file")
          echo "[$executed] Executing $filename..."
          
          # Set timeout for execution
          timeout_seconds=10
          
          # Try --help flag first
          if timeout ${timeout_seconds}s python "$file" --help 2>/dev/null >/dev/null; then
            echo "    PASS - File executed (has --help)"
            passed=$((passed + 1))
          else
            # File doesn't support --help, try running it normally
            output=$(timeout ${timeout_seconds}s python "$file" 2>&1)
            exit_code=$?
            
            if [ $exit_code -eq 124 ]; then
              # Timeout
              echo "    TIMEOUT - File took too long (>${timeout_seconds}s)"
              skipped=$((skipped + 1))
            elif echo "$output" | grep -qE "(ImportError|ModuleNotFoundError)"; then
              # Import error - real bug
              echo "    FAIL - Import error"
              echo "    Error output:"
              echo "$output" | head -5 | sed 's/^/      /'
              failed=$((failed + 1))
            elif echo "$output" | grep -qE "(TFE_TOKEN|TFE_URL|TFE_ORG|required|missing|unauthorized)"; then
              # Missing credentials - expected
              echo "    EXPECTED - Requires TFE credentials"
              passed=$((passed + 1))
            elif [ $exit_code -eq 0 ]; then
              # Successful execution
              echo "    PASS - File executed successfully"
              passed=$((passed + 1))
            else
              # Other execution error
              echo "    FAIL - Execution error"
              echo "    Error output:"
              echo "$output" | head -5 | sed 's/^/      /'
              failed=$((failed + 1))
            fi
          fi
          echo ""
        done < <(find examples/ -name "*.py" -type f | sort)
        
        echo "=== Execution Results ==="
        echo "Total files: $executed"
        echo "Passed: $passed"
        echo "Failed: $failed"
        echo "Skipped/Timeout: $skipped"
        echo ""
        
        if [ $failed -gt 0 ]; then
          echo "Some example files failed execution"
          exit 1
        else
          echo "All example files executed successfully or require credentials"
        fi

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-example-syntax, test-example-imports, test-example-linting, test-all-examples-matrix]
    if: always()
    
    steps:
    - name: Check results
      run: |
        echo "=== Example Testing Summary ==="
        echo "Syntax testing: ${{ needs.test-example-syntax.result }}"
        echo "Import testing: ${{ needs.test-example-imports.result }}"
        echo "Linting: ${{ needs.test-example-linting.result }}"
        echo "Multi-Python testing: ${{ needs.test-all-examples-matrix.result }}"
        
        if [ "${{ needs.test-example-syntax.result }}" != "success" ] || \
           [ "${{ needs.test-example-imports.result }}" != "success" ] || \
           [ "${{ needs.test-all-examples-matrix.result }}" != "success" ]; then
          echo ""
          echo "ERROR: Some tests failed!"
          exit 1
        else
          echo ""
          echo " All example file tests passed!"
        fi
